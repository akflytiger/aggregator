name: Auto Run Aggregator

on:
  # 定时任务：每天国际标准时间 0:00 和 12:00 自动运行（可自行修改）
  schedule:
    - cron: '0 */6 * * *'
  # 支持手动触发
  workflow_dispatch:

jobs:
  run-aggregator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Script
        # 如果需要传入配置参数，可以通过环境变量或修改配置文件实现
        run: |
          python subscribe/collect.py -p 35
